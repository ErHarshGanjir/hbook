<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H book - Payroll Management System</title>
    
    <!-- Favicon Configuration -->
    <link rel="icon" type="image/png" href="https://ibb.co">
    
    <style>
        /* Reset absolute margins and hide default browser scrollbars */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }

        /* Enforce exact fullscreen dimensions for the embedded app */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Embedded Google Apps Script with Max Elevated Privileges -->
    <iframe 
        src="https://google.com"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-popups-to-escape-sandbox allow-top-navigation"
        allow="autoplay; camera; microphone; geolocation; fullscreen; clipboard-write; clipboard-read">
    </iframe>

</body>
</html>
