<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>H Book</title>

    <meta name="theme-color" content="#1565C0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Splash Screen -->

<div id="splash" class="screen active">

    <img
        src="assets/logo.png"
        class="logo"
        alt="H Book">

    <h1>H Book</h1>

    <p>Secure Workspace</p>

    <div class="loader"></div>

</div>

<!-- Create PIN -->

<div id="createPin" class="screen">

    <div class="card">

        <img src="assets/logo.png" class="smallLogo">

        <h2>Create MPIN</h2>

        <p>Create a secure 6 digit MPIN</p>

        <div class="pinDisplay" id="createDots">

            ○ ○ ○ ○ ○ ○

        </div>

        <div class="keypad">

            <button>1</button>
            <button>2</button>
            <button>3</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>

            <button class="empty"></button>
            <button>0</button>
            <button id="deletePin">⌫</button>

        </div>

    </div>

</div>

<!-- Confirm PIN -->

<div id="confirmPin" class="screen">

    <div class="card">

        <img src="assets/logo.png" class="smallLogo">

        <h2>Confirm MPIN</h2>

        <p>Enter the same MPIN again</p>

        <div class="pinDisplay" id="confirmDots">

            ○ ○ ○ ○ ○ ○

        </div>

        <div class="keypad">

            <button>1</button>
            <button>2</button>
            <button>3</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>

            <button class="empty"></button>
            <button>0</button>
            <button id="deleteConfirm">⌫</button>

        </div>

    </div>

</div>

<!-- Login -->

<div id="login" class="screen">

    <div class="card">

        <img src="assets/logo.png" class="smallLogo">

        <h2>Unlock H Book</h2>

        <p>Enter your MPIN</p>

        <div class="pinDisplay" id="loginDots">

            ○ ○ ○ ○ ○ ○

        </div>

        <div class="keypad">

            <button>1</button>
            <button>2</button>
            <button>3</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>

            <button id="settingsBtn">⚙</button>
            <button>0</button>
            <button id="deleteLogin">⌫</button>

        </div>

    </div>

</div>

<!-- Loading -->

<div id="loading" class="screen">

    <div class="loader big"></div>

    <h2>Opening H Book...</h2>

</div>

<!-- Offline -->

<div id="offline" class="screen">

    <div class="card">

        <h1>📡</h1>

        <h2>No Internet</h2>

        <p>

            Please connect to WiFi or Mobile Data.

        </p>

        <button id="retryBtn">

            Retry

        </button>

    </div>

</div>

<!-- Settings -->

<div id="settings" class="screen">

    <div class="card">

        <h2>Settings</h2>

        <button id="changePin">

            Change MPIN

        </button>

        <button id="about">

            About

        </button>

        <button id="back">

            Back

        </button>

    </div>

</div>

<!-- Web App -->

<div id="webapp" class="screen">

    <iframe

        id="appFrame"

        src=""

        allow="camera; microphone"

        loading="lazy">

    </iframe>

</div>

<script src="app.js"></script>

</body>
</html>
